<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Stranica nije pronađena | Front Development</title>
<meta name="robots" content="noindex">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'PT Serif',Georgia,serif;background:#f7f8f8;color:#181D24;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{max-width:560px;text-align:center}
  .num{font-size:clamp(6rem,18vw,10rem);font-weight:700;line-height:1;color:#00707D;margin-bottom:16px}
  h1{font-size:clamp(1.5rem,4vw,2.25rem);margin-bottom:16px}
  p{color:#5a6470;font-size:1.05rem;margin-bottom:32px;line-height:1.6;font-family:-apple-system,sans-serif}
  a.btn{display:inline-block;padding:14px 28px;background:#00707D;color:#fff;text-decoration:none;border-radius:8px;font-weight:500;text-transform:uppercase;font-size:14px;letter-spacing:0.05em;font-family:-apple-system,sans-serif;transition:all 0.2s}
  a.btn:hover{background:#004E58}
  .langs{margin-top:40px;font-size:13px;color:#5a6470;font-family:-apple-system,sans-serif}
  .langs a{color:#00707D;padding:0 8px;text-decoration:none}
  .langs a:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>Stranica nije pronađena</h1>
    <p>Stranica koju tražite ne postoji ili je premještena.</p>
    <a href="/" class="btn">Vrati se na početnu</a>
    <div class="langs">
      <a href="/">HR</a> · <a href="/en/">EN</a> · <a href="/ua/">UA</a>
    </div>
  </div>
</body>
